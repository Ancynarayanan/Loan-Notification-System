{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Leader Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: #00a8cc; /* vibrant teal */
}

.login-container{
    width:420px;
    padding:45px;
    border-radius:16px;
    background: #f5f5f5; /* light gray for contrast */
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    text-align:center;
    color:#2d3436; /* dark text for readability */
    border: 2px solid #00a8cc; /* teal border for accent */
}

.logo{
    font-size:40px;
    margin-bottom:15px;
    color: #00a8cc; /* match accent color */
}

.title{
    font-size:28px;
    font-weight:700;
    margin-bottom:10px;
}

.subtitle{
    font-size:15px;
    opacity:0.9;
    margin-bottom:35px;
    color:#555;
}

.input-group{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:2px solid #ccc;
    outline:none;
    background: #fff;
    color:#2d3436;
    font-size:15px;
    font-weight:500;
    transition: 0.3s;
}

input::placeholder{
    color: #aaa;
}

input:focus{
    border-color: #00a8cc;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00a8cc; /* teal button */
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:12px;
}

button:hover{
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.error{
    color:#e74c3c;
    margin-bottom:15px;
    font-size:14px;
    font-weight:600;
}

.back-link{
    display:block;
    margin-top:15px;
    font-size:13px;
    color: #00a8cc;
    text-decoration: none;
}

.back-link:hover{
    text-decoration: underline;
}

.footer{
    margin-top:30px;
    font-size:12px;
    opacity:0.9;
    color: #555;
}
</style>
</head>

<body>

<div class="login-container">

<div class="logo">📨</div>

<div class="title">Team Leader Login</div>
<div class="subtitle">Secure Access to SMS Portal</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="input-group">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>
<a href="/" class="back-link">← Back to Home</a>

</form>

<div class="footer">
Authorized Access Only
</div>

</div>

</body>
</html>
