<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* General Body */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 0;
}

/* Navbar */
.navbar {
    background: #1e3c72;
    color: #fff;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h2 {
    margin: 0;
    font-size: 22px;
}

.logout-btn {
    background: #ff4d4d;
    color: #fff;
    padding: 8px 15px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
}

.logout-btn:hover {
    background: #e60000;
}


/* Stats Box */
.box {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px 20px;
    flex-wrap: wrap;
}

.card {
    flex: 1 1 200px;
    padding: 25px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    text-align: center;
    transition: transform 0.2s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    font-size: 16px;
    color: #555;
    margin-bottom: 10px;
}

.card h2 {
    font-size: 28px;
    color: #1e3c72;
}

/* Chart */
canvas#chart {
    display: block;
    max-width: 90%;
    margin: 30px auto;
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}

/* Table */
table {
    width: 90%;
    margin: 30px auto;
    border-collapse: collapse;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    background: #fff;
}

th, td {
    padding: 12px 15px;
    text-align: center;
}

th {
    background: #1e3c72;
    color: #fff;
    font-weight: 600;
}

tr:nth-child(even) {
    background: #f5f5f5;
}

tr:hover {
    background: #e0f0ff;
}

</style>
</head>

<body>

<div class="navbar">
    <h2>Admin Dashboard</h2>
    <a href="{% url 'logout_admin' %}" class="logout-btn">Logout</a>
</div>
<div class="box">
    <div class="card">
        <h3>Today</h3>
        <h2>{{today_count}}</h2>
    </div>
    <div class="card">
        <h3>This Month</h3>
        <h2>{{month_count}}</h2>
    </div>
    <div class="card">
        <h3>Total</h3>
        <h2>{{total_count}}</h2>
    </div>
</div>

<canvas id="chart" width="400"></canvas>

<script>
const data = {
    labels: [
        {% for b in branch_data %}
        "{{b.branch}}",
        {% endfor %}
    ],
    datasets: [{
        label: "Branch Messages",
        data: [
            {% for b in branch_data %}
            {{b.total}},
            {% endfor %}
        ],
        backgroundColor: 'rgba(30,60,114,0.7)',
        borderColor: 'rgba(30,60,114,1)',
        borderWidth: 1,
        borderRadius: 6
    }]
};

new Chart(document.getElementById("chart"), {
    type: "bar",
    data: data,
    options: {
        responsive: true,
        plugins: {
            legend: { display: false },
            tooltip: { mode: 'index', intersect: false }
        },
        scales: {
            y: { beginAtZero: true }
        }
    }
});
</script>

<h3 style="text-align:center">Today Reports</h3>

<table>
    <tr>
        <th>Name</th>
        <th>Mobile</th>
        <th>Branch</th>
        <th>Document</th>
        <th>Loan</th>
        <th>Fees</th>
        <th>Time</th>
    </tr>

    {% for r in today_reports %}
    <tr>
        <td>{{r.name}}</td>
        <td>{{r.mobile}}</td>
        <td>{{r.branch}}</td>
        <td>{{r.document}}</td>
        <td>{{r.loan}}</td>
        <td>{{r.fees}}</td>
        <td>{{r.created_at}}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
